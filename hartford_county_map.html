<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hartford County, CT — Interactive Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family: system-ui, sans-serif; }
  #app { display:grid; grid-template-columns: 320px 1fr; height:100vh; }
  #sidebar { background:#0f1720; color:#e6edf3; padding:18px; overflow:auto; }
  #sidebar h1 { font-size:18px; margin:0 0 6px; }
  #sidebar p  { font-size:13px; line-height:1.4; color:#9aa7b4; margin:0 0 14px; }
  #map { height:100%; }
  .ctrl { background:#1b2530; padding:10px 12px; border-radius:8px; margin-bottom:10px; font-size:13px; }
  .ctrl label { display:flex; align-items:center; gap:8px; cursor:pointer; }
  .legend { background:#1b2530; padding:10px 12px; border-radius:8px; font-size:12px; }
  .legend .sw { display:inline-block; width:14px; height:14px; vertical-align:middle; margin-right:6px; border:1px solid #334; }
  .town-list { font-size:12px; max-height:280px; overflow:auto; background:#1b2530; border-radius:8px; padding:8px 10px; }
  .town-list div { padding:3px 4px; cursor:pointer; border-radius:4px; }
  .town-list div:hover { background:#2a3a4d; }
  .leaflet-popup-content b { font-size:14px; }
  .leaflet-popup-content .stat { display:flex; justify-content:space-between; font-size:12px; padding:2px 0; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>Hartford County, CT</h1>
    <p>Interactive map of the 29 towns. Data via OpenStreetMap / Nominatim. Click a town for details.</p>

    <div class="ctrl">
      <label><input type="checkbox" id="energyOverlay" checked /> Energy-load shading</label>
    </div>
    <div class="ctrl">
      <label>Basemap
        <select id="basemap" style="margin-left:auto">
          <option value="osm">OSM Standard</option>
          <option value="topo">OpenTopoMap</option>
          <option value="carto">Carto Light</option>
        </select>
      </label>
    </div>

    <div class="legend" style="margin-bottom:10px;">
      <div><span class="sw" style="background:#2c7fb8"></span>Low est. load</div>
      <div><span class="sw" style="background:#7fcdbb"></span>Medium</div>
      <div><span class="sw" style="background:#fdae61"></span>High</div>
      <div><span class="sw" style="background:#d7191c"></span>Very high</div>
    </div>

    <div class="town-list" id="townList">Loading towns…</div>
  </aside>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
// 29 towns of Hartford County, CT with rough centroids + a stand-in "estimated load"
// (proportional to population; values are illustrative for the energy-optimization theme).
const TOWNS = [
  {name:"Hartford",         lat:41.7637, lon:-72.6851, pop:121054},
  {name:"New Britain",      lat:41.6612, lon:-72.7795, pop:74992},
  {name:"West Hartford",    lat:41.7620, lon:-72.7420, pop:64083},
  {name:"Bristol",          lat:41.6718, lon:-72.9493, pop:60833},
  {name:"Manchester",       lat:41.7759, lon:-72.5215, pop:59713},
  {name:"Enfield",          lat:41.9762, lon:-72.5917, pop:42141},
  {name:"East Hartford",    lat:41.7823, lon:-72.6120, pop:51045},
  {name:"Southington",      lat:41.6001, lon:-72.8781, pop:43501},
  {name:"Glastonbury",      lat:41.7126, lon:-72.6081, pop:35159},
  {name:"South Windsor",    lat:41.8237, lon:-72.6223, pop:26918},
  {name:"Windsor",          lat:41.8525, lon:-72.6437, pop:29492},
  {name:"Newington",        lat:41.6981, lon:-72.7237, pop:30152},
  {name:"Wethersfield",     lat:41.7142, lon:-72.6526, pop:26492},
  {name:"Rocky Hill",       lat:41.6648, lon:-72.6648, pop:20845},
  {name:"Bloomfield",       lat:41.8281, lon:-72.7295, pop:21535},
  {name:"Plainville",       lat:41.6745, lon:-72.8589, pop:17716},
  {name:"Farmington",       lat:41.7201, lon:-72.8320, pop:26712},
  {name:"Berlin",           lat:41.6212, lon:-72.7456, pop:20175},
  {name:"Avon",             lat:41.8098, lon:-72.8303, pop:18871},
  {name:"Simsbury",         lat:41.8762, lon:-72.8009, pop:24517},
  {name:"Windsor Locks",    lat:41.9292, lon:-72.6234, pop:12613},
  {name:"East Windsor",     lat:41.9123, lon:-72.5453, pop:11190},
  {name:"Suffield",         lat:41.9837, lon:-72.6520, pop:15735},
  {name:"Granby",           lat:41.9526, lon:-72.7898, pop:11282},
  {name:"Canton",           lat:41.8348, lon:-72.8945, pop:10124},
  {name:"Marlborough",      lat:41.6320, lon:-72.4598, pop:6307},
  {name:"East Granby",      lat:41.9434, lon:-72.7320, pop:5184},
  {name:"Hartland",         lat:41.9856, lon:-72.9534, pop:1885},
  {name:"Burlington",       lat:41.7720, lon:-72.9590, pop:9701},
];

const map = L.map('map').setView([41.80, -72.73], 10);

const basemaps = {
  osm:   L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
           {maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}),
  topo:  L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
           {maxZoom:17, attribution:'&copy; OpenTopoMap, OSM'}),
  carto: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
           {maxZoom:19, attribution:'&copy; CARTO, OSM'}),
};
basemaps.osm.addTo(map);
let current = basemaps.osm;
document.getElementById('basemap').onchange = e => {
  map.removeLayer(current);
  current = basemaps[e.target.value];
  current.addTo(map);
};

// County rough bounding box outline
const countyBBox = L.rectangle([[41.55,-73.05],[42.05,-72.40]],
  {color:"#444", weight:1, fill:false, dashArray:"4 4"}).addTo(map);

function loadColor(pop) {
  if (pop > 80000) return "#d7191c";
  if (pop > 40000) return "#fdae61";
  if (pop > 18000) return "#7fcdbb";
  return "#2c7fb8";
}

const markers = {};
const energyLayer = L.layerGroup().addTo(map);

TOWNS.forEach(t => {
  // Energy-load shaded circle (radius scales with sqrt of population)
  const ring = L.circle([t.lat, t.lon], {
    radius: Math.sqrt(t.pop) * 22,
    color: loadColor(t.pop),
    fillColor: loadColor(t.pop),
    fillOpacity: 0.35,
    weight: 1.5,
  });
  ring.bindPopup(() => `
    <b>${t.name}</b><br>
    <div class="stat"><span>Population</span><b>${t.pop.toLocaleString()}</b></div>
    <div class="stat"><span>Est. peak load</span><b>${(t.pop*1.3/1000).toFixed(1)} MW</b></div>
    <div class="stat"><span>Solar potential*</span><b>${(t.pop*0.0042).toFixed(1)} MW</b></div>
    <hr style="margin:6px 0;border:none;border-top:1px solid #ddd"/>
    <a target="_blank" href="https://www.openstreetmap.org/search?query=${encodeURIComponent(t.name+', Hartford County, CT')}">View on OpenStreetMap →</a>
    <div style="font-size:10px;color:#888;margin-top:4px">*illustrative — replace with real model data</div>
  `);
  ring.addTo(energyLayer);
  markers[t.name] = ring;
});

document.getElementById('energyOverlay').onchange = e => {
  if (e.target.checked) energyLayer.addTo(map);
  else map.removeLayer(energyLayer);
};

// Town list
const list = document.getElementById('townList');
list.innerHTML = '';
[...TOWNS].sort((a,b)=>a.name.localeCompare(b.name)).forEach(t => {
  const row = document.createElement('div');
  row.textContent = t.name;
  row.onclick = () => {
    map.setView([t.lat,t.lon], 13);
    markers[t.name].openPopup();
  };
  list.appendChild(row);
});

// Fit to county
map.fitBounds(countyBBox.getBounds(), {padding:[20,20]});
</script>
</body>
</html>
